name: Daily OCC Monitor

on:
  schedule:
    # Runs everyday at 13:00 UTC (9:00 AM EST)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allows you to manually trigger the check via the GitHub website

jobs:
  check-page:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run page monitor script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python Monitor_OCC.py

    - name: Commit and Push hash changes back to repo
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add last_hash.txt
        # Pull any recent changes first, then commit and push
        git pull origin main --rebase
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update tracking hash [skip ci]" && git push)